<section class="calca-roadmap">
  <style>
    .calca-roadmap {
      --text: #fff;
      --muted: rgba(255,255,255,.78);
      --card: rgba(255,255,255,.14);
      --soft: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.24);

      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent !important;
    }

    .calca-roadmap * { box-sizing: border-box; }

    .calca-roadmap h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: #fff;
      text-shadow: 0 2px 14px rgba(0,0,0,.45);
    }

    .calca-roadmap .intro {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
    }

    .roadmap-grid {
      display: grid;
      gap: 16px;
    }

    .roadmap-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 8px 32px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .roadmap-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .roadmap-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
    }

    .roadmap-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 700;
      white-space: nowrap;
      color: #fff;
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.14);
    }

    .badge-lanzado { background: rgba(22,163,74,.9); }
    .badge-testing { background: rgba(217,119,6,.9); }
    .badge-roadmap { background: rgba(107,114,128,.9); }

    .badge-alta {
      color: #fecaca;
      border: 2px solid rgba(248,113,113,.9);
      background: rgba(239,68,68,.16);
    }

    .badge-media {
      color: #fde68a;
      border: 2px solid rgba(245,158,11,.9);
      background: rgba(245,158,11,.16);
    }

    .roadmap-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      padding: 14px;
      margin-bottom: 12px;
      background: var(--soft);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
    }

    .meta-label {
      display: block;
      margin-bottom: 4px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    .meta-value {
      font-size: .92rem;
      font-weight: 600;
      color: #fff;
    }

    .roadmap-notas {
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.14);
      font-size: .92rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .roadmap-notas strong { color: #fff; }

    .roadmap-error {
      padding: 16px;
      border-radius: 16px;
      color: #fff;
      background: rgba(239,68,68,.22);
      border: 1px solid rgba(248,113,113,.5);
    }

    @media (max-width: 640px) {
      .calca-roadmap { padding: 16px; }
      .roadmap-meta { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

  <h1>🗺️ CalcaApp Roadmap</h1>
  <p class="intro">Seguimiento de funcionalidades y mejoras planificadas</p>

  <div id="calca-roadmap-grid" class="roadmap-grid"></div>

  <script>
    (function () {
      const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRVpszfT-c693XwpXW9eI3m8r18dQJt8HOE9ajLki-K-nvBHyd0FGAgXoyr67j43Fg06Y4sRgyQ1vZ/pub?gid=0&single=true&output=csv";

      const grid = document.getElementById("calca-roadmap-grid");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function parseCsv(csv) {
        const rows = [];
        let row = [];
        let value = "";
        let insideQuotes = false;

        for (let i = 0; i < csv.length; i++) {
          const char = csv[i];
          const nextChar = csv[i + 1];

          if (char === '"' && insideQuotes && nextChar === '"') {
            value += '"';
            i++;
          } else if (char === '"') {
            insideQuotes = !insideQuotes;
          } else if (char === "," && !insideQuotes) {
            row.push(value);
            value = "";
          } else if ((char === "\n" || char === "\r") && !insideQuotes) {
            if (value || row.length) {
              row.push(value);
              rows.push(row);
              row = [];
              value = "";
            }
            if (char === "\r" && nextChar === "\n") i++;
          } else {
            value += char;
          }
        }

        if (value || row.length) {
          row.push(value);
          rows.push(row);
        }

        return rows;
      }

      function normalizeKey(key) {
        return key.trim().toLowerCase();
      }

      function getBadgeClass(value) {
        const text = String(value || "").toLowerCase();

        if (text.includes("lanzado")) return "badge-lanzado";
        if (text.includes("testing")) return "badge-testing";
        if (text.includes("roadmap")) return "badge-roadmap";
        if (text.includes("alta")) return "badge-alta";
        if (text.includes("media")) return "badge-media";

        return "";
      }

      function rowToObject(headers, row) {
        return headers.reduce(function (item, header, index) {
          item[normalizeKey(header)] = row[index] ? row[index].trim() : "";
          return item;
        }, {});
      }

      function renderItem(item) {
        const id = escapeHtml(item.id);
        const funcionalidad = escapeHtml(item.funcionalidad);
        const categoria = escapeHtml(item["categoría"] || item.categoria);
        const estado = escapeHtml(item.estado);
        const prioridad = escapeHtml(item.prioridad);
        const trimestre = escapeHtml(item.trimestre);
        const plataforma = escapeHtml(item.plataforma);
        const notas = escapeHtml(item.notas);

        return `
          <article class="roadmap-item">
            <div class="roadmap-header">
              <h2 class="roadmap-title">${id}. ${funcionalidad}</h2>
              <div class="roadmap-badges">
                <span class="badge ${getBadgeClass(estado)}">${estado}</span>
                <span class="badge ${getBadgeClass(prioridad)}">${prioridad}</span>
              </div>
            </div>

            <div class="roadmap-meta">
              <div>
                <span class="meta-label">Categoría</span>
                <span class="meta-value">${categoria}</span>
              </div>
              <div>
                <span class="meta-label">Trimestre</span>
                <span class="meta-value">${trimestre}</span>
              </div>
              <div>
                <span class="meta-label">Plataforma</span>
                <span class="meta-value">${plataforma}</span>
              </div>
            </div>

            <p class="roadmap-notas">
              <strong>Notas:</strong> ${notas}
            </p>
          </article>
        `;
      }

      fetch(SHEET_CSV_URL)
        .then(function (response) {
          if (!response.ok) {
            throw new Error("No se pudo cargar la hoja.");
          }
          return response.text();
        })
        .then(function (csv) {
          const rows = parseCsv(csv).filter(function (row) {
            return row.some(function (cell) {
              return cell.trim() !== "";
            });
          });

          const headers = rows.shift();
          const items = rows.map(function (row) {
            return rowToObject(headers, row);
          });

          grid.innerHTML = items.map(renderItem).join("");
        })
        .catch(function () {
          grid.innerHTML = `
            <div class="roadmap-error">
              No se pudo cargar el roadmap desde Google Sheets.
            </div>
          `;
        });
    })();
  </script>
</section>
